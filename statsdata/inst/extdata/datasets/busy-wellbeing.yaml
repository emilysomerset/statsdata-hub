id: busy-wellbeing
title: "Social Pressure to be Busy and Emotional Wellbeing"
description: >
  A daily diary study examining how social pressure to appear busy relates
  to emotional wellbeing. Data were collected from 261 participants over
  approximately 7 days each, yielding 1,827 person-day observations.
  Participants reported daily busyness, positive affect, negative affect,
  anxiety, and depressive symptoms, alongside person-level demographics,
  socioeconomic status, Big Five personality traits, and emotional
  complexity measures. Ideal for teaching multilevel modeling, within-person
  centering, and longitudinal data analysis.

source:
  citation: "Lua VYQ, Majeed NM, Leung AK, Hartanto A. (2022). A daily within-person investigation on the link between social expectancies to be busy and emotional wellbeing: the moderating role of emotional complexity acceptance. Cognition and Emotion, 1-8. https://doi.org/10.1080/02699931.2022.2054778"
  researchbox: "Lua, V., Majeed, N., & Hartanto, A. (2025). ResearchBox 234, Social Pressure to be Busy & Emotional Well-Being, https://ResearchBox.org/234. Zenodo. https://doi.org/10.5281/zenodo.15032678"
  url: "https://researchbox.org/234"
  license: "CC BY 4.0 (https://creativecommons.org/licenses/by/4.0/)"

file: "data/clean/busy_wellbeing/busy-wellbeing.csv"

methods: [multilevel_modeling, linear_regression]
concepts: [clustered_observations, missing_data, multicollinearity]
variable_types: [continuous, ordinal, binary, count]
course_level: [advanced_undergraduate, graduate]
discipline: [psychology]
data_source_type: published_study

characteristics:
  n_obs: 1827
  n_vars: 114
  missingness: true
  survey_weights: false
  longitudinal: true
  hierarchical: true
  cross_sectional: false

teaching:
  learning_objectives:
    - "Explain the difference between between-person and within-person effects"
    - "Apply group mean centering to separate within- and between-person variance"
    - "Fit a multilevel model with person-level and day-level predictors"
    - "Interpret fixed and random effects in a longitudinal model"
  classroom_activities:
    - "Compare a naive OLS regression ignoring clustering to a multilevel model, and discuss what changes"
    - "Visualize within-person trajectories of busyness and affect across days"


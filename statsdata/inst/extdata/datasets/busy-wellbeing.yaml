    type: continuous
    description: "Daily perceived social pressure to be busy (3-item)"
  - name: modifiedBusy_mn
    type: continuous
    description: "Person mean of modifiedBusy (between-person component)"
  - name: modifiedBusy_dev
    type: continuous
    description: "Person mean centred modifiedBusy (within-person component)"
  - name: fouritemBusy
    type: continuous
    description: "Daily perceived social pressure to be busy (4-item)"
  - name: fouritemBusy_mn
    type: continuous
    description: "Person mean of fouritemBusy (between-person component)"
  - name: fouritemBusy_dev
    type: continuous

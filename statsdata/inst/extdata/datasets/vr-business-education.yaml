id: vr-business-education
title: "Virtual Reality vs. Video vs. Paper Business Case Studies: Learning Outcomes"
description: >
  Data from a randomized experiment (N=148) comparing learning outcomes
  across three business case study formats: paper-based, video-based, and
  virtual reality (VR). Participants were randomly assigned to one
  condition and completed a business case study, then responded to
  measures of presence (IPQ), motivation (IMMS), task load (TLI),
  technology adoption intentions, and a knowledge recall quiz. VR
  participants demonstrated superior recall of both factual and visual
  details compared to paper and video conditions. Missingness in adoption
  items is structural: participants only rated adoption intentions for
  their assigned medium. Ideal for teaching one-way ANOVA, planned
  contrasts, structural missing data, and analysis of experimental
  between-subjects designs with multiple outcome measures.

source:
  citation: "Hubbard TD. (2025). Transforming business education: the impact of virtual reality on learning outcomes in case studies. Frontiers in Virtual Reality, 6. https://doi.org/10.3389/frvir.2025.1461690"
  researchbox: "Gershon, R., & Milkman, K. (2025). ResearchBox 3216, Virtual Reality Business Education, https://ResearchBox.org/3216. Zenodo."
  url: "https://researchbox.org/3216"
  license: "CC BY 4.0 (https://creativecommons.org/licenses/by/4.0/)"

file: "data/clean/vr_business_education/Dataset.dta"

data_source_type: published_study

methods: [anova, linear_regression, t_test]
concepts: [missing_data, confounding, selection_bias]
variable_types: [ordinal, categorical, continuous, binary, count, text]
course_level: [intermediate, advanced_undergraduate]
discipline: [education, psychology]

characteristics:
  n_obs: 148
  n_vars: 181
  missingness: true
  survey_weights: false
  longitudinal: false
  hierarchical: false
  cross_sectional: true

teaching:
  learning_objectives:
    - "Conduct a one-way ANOVA comparing three experimental conditions"
    - "Use planned contrasts to test specific hypotheses about VR vs. paper and video"
    - "Distinguish between structural missingness (by design) and problematic missingness"
    - "Interpret multiple dependent variables from a single experiment"
  classroom_activities:
    - "Compare mean knowledge recall scores across conditions and test for significant differences"
    - "Discuss why adoption items are missing for non-assigned conditions and whether this is a problem"
    - "Explore whether presence (IPQ) mediates the effect of condition on learning outcomes"
  common_misconceptions:
    - "Treating structural NAs in condition-specific adoption items as data quality problems"
    - "Ignoring multiple comparisons when testing all pairwise differences between three conditions"

